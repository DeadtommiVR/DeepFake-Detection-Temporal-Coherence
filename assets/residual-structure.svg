<circle cx="586" cy="232" r="4"/><circle cx="600" cy="224" r="4"/><circle cx="576" cy="222" r="4"/><circle cx="608" cy="240" r="4"/><circle cx="592" cy="212" r="4"/><circle cx="574" cy="242" r="4"/>
</g>
<circle cx="452" cy="290" r="4" fill="#B5D4F4" stroke="#2F7CCB" stroke-width="1"/>
<text class="ts" x="462" y="294">authentic</text>
<circle cx="548" cy="290" r="4" fill="#F5C4B3" stroke="#C24E28" stroke-width="1"/>
